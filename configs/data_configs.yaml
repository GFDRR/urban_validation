aoi:
  path: data/02_interim/aoi_tracker.csv
  # path: data/01_raw/ssd-juba/aoi/juba_aoi.geojson
  base_dir: "/content/drive/MyDrive/Gates Foundation/Building Dataset Validation/data/01_raw"
  id_col: "Dataset code"
  crs_out: "EPSG:4326"
  buffer_meters: 0
  filter_suitable: true

overture:
  enabled: true
  provider: "aws"          
  release: "latest" 
  theme: "buildings"
  types: ["building"] # "building_part"]
  s3_url: "s3://overturemaps-us-west-2/release/"
  s3_region: "us-west-2"

gba:
  enabled: true
  s3_url: "s3://us-west-2.opendata.source.coop/tge-labs/globalbuildingatlas-lod1/"
  s3_region: "us-west-2"

globfp:
  enabled: true
  local_dir: "data/01_raw/globfp_cache"
  zenodo_record: 15487006

output:
  overwrite: false
  use_base_dir_for_output: true  # write into <aoi.base_dir>/<dataset_id>/raster/
  root_dir: "/content/drive/MyDrive/Gates Foundation/Building Dataset Validation/outputs/"      # only used when use_base_dir_for_output is false

ee_project: "urbanvalidation"   # e.g. "ee-myproject"

datasets:

  google_open_buildings_temporal:
    enabled: true
    ee_collection_id: "GOOGLE/Research/open-buildings-temporal/v1"
    years: [2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023]
    bands:
      - building_presence
      - building_height
      - building_fractional_count
    scale: 4          # native resolution in metres

  microsoft_tempo:
    enabled: true
    tile_index_url: "https://opendata.aiforgood.ai/building-density/tile_index.gpkg"
    tile_index_cache: "data/cache/tempo_tile_index.gpkg"
    tile_cache_dir: "data/cache/tempo_tiles"   # shared across all cities
    make_mosaic: true

  ghsl:
    enabled: true
    products:
      BUILT_H:
        ee_id: "JRC/GHSL/P2023A/GHS_BUILT_H"
        band: "built_height"
        scale: 100
        years: [2018]
      BUILT_S:
        ee_id: "JRC/GHSL/P2023A/GHS_BUILT_S"
        band: "built_surface"
        scale: 100
        years: [1975, 1980, 1985, 1990, 1995, 2000, 2005, 2010, 2015, 2020, 2025, 2030]
      BUILT_V:
        ee_id: "JRC/GHSL/P2023A/GHS_BUILT_V"
        band: "built_volume_total"
        scale: 100
        years: [1975, 1980, 1985, 1990, 1995, 2000, 2005, 2010, 2015, 2020, 2025, 2030]