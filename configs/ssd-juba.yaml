city: ssd-juba
root_dir: .

crs: EPSG:32636         # UTM zone 36N

aoi_path: data/01_raw/ssd-juba/aoi/juba_aoi.geojson

reference_vector: data/01_raw/ssd-juba/vector/juba_osm_buildings.geojson

candidates:
- name: obm
  path: data/01_raw/ssd-juba/vector/juba_openbuildingmap_buildings.geojson
- name: google
  path: data/01_raw/ssd-juba/vector/juba_google_buildings.geojson

min_area_m2: 20           # filter very tiny polygons
tile_size_m: 1000         # 1 km tiles
tau_overlap: 0.5          # minimum IoU for a match
tau_buffer_m: 2.0         # positional tolerance (optional, not yet used below)
tau_boundary: 2.0         # tolerance for calculating boundary overlap

raster_validation:
  tau_frac: 0.2           # default threshold for converting fractional/area predictions to binary built/not-built (if dataset doesn't override)
  oversample_factor: 4    # reference rasterization oversampling; consider higher (8–16) for coarse rasters (76–100m)  
  all_touched: false      # include pixels touched by polygons when rasterizing reference

raster_candidates:
# WSF tracker: one-band GeoTIFF. Binary building presence indication. Numbers refer to non-built up (0) or 1-19 for the 6-month interval in which a buildnig was first detected.
- name: wsf-tracker202507
  path: data/01_raw/ssd-juba/raster/juba_wsftracker_201607_202507.tif
  binarize:
    method: wsf_tracker
    as_of_code: 19
    built_value_min: 1
    nonbuilt_value: 0
    threshold_frac: 0.5

# TEMPO: two-band GeoTIFF. Band 1 is building density in [0,1] = fraction of pixel covered by buildings.
- name: tempo
  path: data/01_raw/ssd-juba/raster/juba_tempo.tif
  binarize:
    method: fraction
    band: 1
    clamp_min: 0.0
    clamp_max: 1.0
    threshold_frac: 0.2     # built if fraction > 0.2 (override if you want more/less sensitivity)
  # optional per-dataset override for more stable reference area on coarse grids:
  rasterization:
    oversample_factor: 16

# GHS built-up: uint16 values 0..10000 represent built-up surface in m² per pixel (nominally 100m pixels => 10000 m²).
# We refer to the file as juba_ghs.tif, and dataset name is "ghs".
- name: ghs
  path: data/01_raw/ssd-juba/raster/juba_ghs_built.tif
  binarize:
    method: area_m2
    band: 1
    threshold_m2: 0.0       # built if built-up area > 0 m² (raise to e.g. 100 for noise filtering if needed)
    clamp_to_pixel_area: true
  rasterization:
    oversample_factor: 16


notes: >
  Raster validation compares each candidate raster to the reference building polygons (vector) by
  rasterizing the reference onto the candidate raster's grid per tile.

  Area-based interpretation via raster_candidates[*].binarize.method:
  - wsf_tracker: encoded 0..19 time bins; built if value in [built_value_min..as_of_code]
  - fraction: values 0–1 represent built-up fraction/density per pixel; A_pred = fraction * pixel_area
  - percent: values 0–100 represent built-up percent; A_pred = (value/100) * pixel_area
  - area_m2: values represent built-up area per pixel in m²; A_pred = value (optionally clamped to pixel_area)

  Binary TP/FP/FN/F1 is computed from pred_bin vs ref_bin (per pixel), where pred_bin uses threshold_frac
  (for fraction/percent) or threshold_m2 (for area_m2). If a dataset does not define a threshold, raster_validation.tau_frac is used.

  For coarse rasters (e.g. ~76–100m pixels), increase reference rasterization oversample_factor (8–16) to reduce sub-pixel dropouts.