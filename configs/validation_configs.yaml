root_dir: /content/drive/MyDrive/Gates Foundation/Building Dataset Validation
data_dir: data/01_raw   # relative to root_dir
aoi_tracker: data/02_interim/aoi_tracker.csv

# Working CRS used for all area / distance calculations.
crs: EPSG:4326

vector:
  out_path: data/01_raw   # candidate parquets live at <out_path>/<dataset_folder_name>/vector/

  preprocessing:
    min_area_m2:        20      # drop footprints smaller than this before matching
    tile_size_m:        1000    # evaluation tile side-length in metres
    tau_overlap:        0.5     # minimum IoU to count a pair as a true positive
    tau_buffer_m:       2.0     # positional buffer used in boundary F-score (metres)
    tau_boundary:       2.0     # tolerance for boundary overlap calculation
    fix_invalid_geoms:  true    # set false to skip geometry repair

  # Building size classes for IoU-vs-size and area-error-vs-size plots (m²).
  size_bins:
    bins:   [0, 25, 50, 100, 500, 1000, .inf]
    labels: ["<25", "25–50", "50–100", "100–500", "500–1000", ">1000"]

  datasets:
    - name:    overture
      label:   "Overture Maps"
      enabled: true

    - name:    gba
      label:   "Global Building Atlas"
      enabled: true
      s3_url:    "s3://us-west-2.opendata.source.coop/tge-labs/globalbuildingatlas-lod1/"
      s3_region: "us-west-2"
      country_iso: ssd

    - name:    globfp
      label:   "3D GloBFP"
      enabled: true

raster:
  # Raster files are resolved by combining the city slug, dataset name, and year:
  #   {city_slug}_{name}_{year}.tif
  # Examples (slug = ant_curacao):
  #   ant_curacao_obt_2023.tif
  #   ant_curacao_tempo_2023q4.tif
  #   ant_curacao_ghsl_built_v_2025.tif
  #   ant_curacao_ghsl_built_s_2020.tif
  # If year is omitted the pipeline falls back to a glob (*) and picks the first match.

  preprocessing:
    tau_frac:           0.2     # reference fraction threshold for binarizing ref coverage
    oversample_factor:  4       # oversampling factor for ref rasterization (higher = more accurate for small buildings)
    all_touched:        false   # include all pixels touched by reference polygons (vs centroid-only)

  datasets:
    - name:    obt
      label:   "Google OBT"
      enabled: true
      year:    2023              # → {city_slug}_obt_2023.tif
      binarize:
        method:         fraction # building_presence band is a fractional score [0, 1]
        band:           1
        clamp_min:      0.0
        clamp_max:      1.0
        threshold_frac: 0.2

    - name:    tempo
      label:   "Microsoft TEMPO"
      enabled: true
      year:    2023q4            # → {city_slug}_tempo_2023q4.tif
      binarize:
        method:         fraction # band 1 is fractional building density [0, 1]
        band:           1
        clamp_min:      0.0
        clamp_max:      1.0
        threshold_frac: 0.2
      rasterization:
        oversample_factor: 16

    # GHSL products -- one entry per product x year.
    # Add more entries (or change year) to validate other snapshots.

    - name:    ghsl_built_s      # → {city_slug}_ghsl_built_s_{year}.tif
      label:   "GHS Built-S"
      enabled: true
      year:    2020
      binarize:
        method:              area_m2   # values are built-up surface area in m² per pixel
        band:                1
        clamp_to_pixel_area: true
      rasterization:
        oversample_factor: 16

    # - name:    ghsl_built_v      # → {city_slug}_ghsl_built_v_{year}.tif
    #   label:   "GHS Built-V"
    #   enabled: false
    #   year:    2020
    #   binarize:
    #     method:              area_m2
    #     band:                1
    #     clamp_to_pixel_area: true
    #   rasterization:
    #     oversample_factor: 16

    # - name:    ghsl_built_h      # → {city_slug}_ghsl_built_h_{year}.tif
    #   label:   "GHS Built-H"
    #   enabled: false
    #   year:    2018
    #   binarize:
    #     method:              area_m2
    #     band:                1
    #     clamp_to_pixel_area: true
    #   rasterization:
    #     oversample_factor: 16

output:
  overwrite: false
  metrics:
    save_tile_level: true   # also persist per-dataset tile-level parquets
  figures:
    dpi: 200
    fmt: png                # png | pdf | svg
