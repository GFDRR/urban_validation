root_dir: /content/drive/MyDrive/Gates Foundation/Building Dataset Validation
data_dir: data/01_raw
aoi_tracker: data/02_interim/aoi_tracker.csv

# Used by figure generation in src/plots/figures.py.
size_bins:
  bins: [0, 25, 50, 100, 500, 1000, .inf]
  labels: ["<25", "25-50", "50-100", "100-500", "500-1000", ">1000"]

vector:
  preprocessing:
    min_area_m2: 20
    tile_size_m: 1000
    tau_overlap: 0.5
    tau_buffer_m: 2.0
    tau_boundary: 2.0
    fix_invalid_geoms: true

  datasets:
    - name: overture
      label: Overture Maps
      enabled: true

    - name: gba
      label: Global Building Atlas
      enabled: true

    - name: globfp
      label: 3D GloBFP
      enabled: true

raster:
  preprocessing:
    tau_frac: 0.2
    oversample_factor: 4
    all_touched: false

    evaluation_grids:
      - name: 10m
        resolution: 10
      - name: 30m
        resolution: 30
      - name: 100m
        resolution: 100

    native_resolution_guard:
      enabled: true
      mode: skip_finer
      tolerance_factor: 0.75

  datasets:
    - name: obt
      label: Google OBT
      enabled: true
      year: 2023
      binarize:
        method: fraction
        band: 1
        clamp_min: 0.0
        clamp_max: 1.0
        threshold_frac: 0.2
        nodata: null

    - name: tempo
      label: Microsoft TEMPO
      enabled: true
      year: 2023q4
      binarize:
        method: fraction
        band: 1
        clamp_min: 0.0
        clamp_max: 1.0
        threshold_frac: 0.2
        nodata: null
      rasterization:
        oversample_factor: 16

    - name: ghsl_built_s
      label: GHS Built-S
      enabled: true
      year: 2020
      binarize:
        method: area_m2
        band: 1
        clamp_to_pixel_area: true
        nodata: null
      rasterization:
        oversample_factor: 16

    - name: wsf_tracker
      label: WSF Tracker
      enabled: true
      binarize:
        method: wsf_tracker
        band: 1
        built_value_min: 1
        as_of_code: 18
        nonbuilt_value: 0
        nodata: null
      rasterization:
        oversample_factor: 16

output:
  overwrite: false
  metrics:
    save_tile_level: true
  figures:
    dpi: 200
    fmt: png
