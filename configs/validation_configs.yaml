root_dir: /content/drive/MyDrive/Gates Foundation/Building Dataset Validation
data_dir: data/01_raw   # relative to root_dir
aoi_tracker: data/02_interim/aoi_tracker.csv

# Working CRS used for all area / distance calculations.
crs: EPSG:4326

vector:
  out_path: data/01_raw   # candidate parquets live at <out_path>/<dataset_folder_name>/vector/

  preprocessing:
    min_area_m2:        20      # drop footprints smaller than this before matching
    tile_size_m:        1000    # evaluation tile side-length in metres
    tau_overlap:        0.5     # minimum IoU to count a pair as a true positive
    tau_buffer_m:       2.0     # positional buffer used in boundary F-score (metres)
    tau_boundary:       2.0     # tolerance for boundary overlap calculation
    fix_invalid_geoms:  true    # set false to skip geometry repair

  # Building size classes for IoU-vs-size and area-error-vs-size plots (m²).
  size_bins:
    bins:   [0, 25, 50, 100, 500, 1000, .inf]
    labels: ["<25", "25–50", "50–100", "100–500", "500–1000", ">1000"]

  datasets:
    - name:    overture
      label:   "Overture Maps"
      enabled: true

    - name:    gba
      label:   "Global Building Atlas"
      enabled: true
      s3_url:    "s3://us-west-2.opendata.source.coop/tge-labs/globalbuildingatlas-lod1/"
      s3_region: "us-west-2"
      country_iso: ssd

    - name:    globfp
      label:   "3D GloBFP"
      enabled: true

raster:
  out_path: data/01_raw   # candidate rasters live at <out_path>/<dataset_folder_name>/raster/

  preprocessing:
    tau_frac:           0.2     # default binarisation threshold
    oversample_factor:  4       # reference rasterization oversampling factor
    all_touched:        false   # include pixels touched by reference polygons

  datasets:
    - name: wsf-tracker
      label: "WSF Tracker"
      binarize:
        method:           wsf_tracker
        as_of_code:       19
        built_value_min:  1
        nonbuilt_value:   0
        threshold_frac:   0.5

    - name: tempo
      label: "TEMPO"
      binarize:
        method:         fraction
        band:           1
        clamp_min:      0.0
        clamp_max:      1.0
        threshold_frac: 0.2
      rasterization:
        oversample_factor: 16

    - name: ghs
      label: "GHS Built-S"
      binarize:
        method:              area_m2
        band:                1
        threshold_m2:        0.0
        clamp_to_pixel_area: true
      rasterization:
        oversample_factor: 16

output:
  overwrite: false
  metrics:
    save_tile_level: true   # also persist per-dataset tile-level parquets
  figures:
    dpi: 200
    fmt: png                # png | pdf | svg
